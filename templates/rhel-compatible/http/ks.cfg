# Generic kickstart file for RHEL-compatible distributions
# Works with AlmaLinux, Oracle Linux, RHEL, and other RHEL derivatives

# System configuration
text
skipx
lang en_US.UTF-8
keyboard us
timezone UTC --isUtc

# Network configuration - DHCP for all interfaces
network --bootproto=dhcp --onboot=yes --device=eth0 --hostname=rhel-compatible

# Security settings
firewall --disabled
selinux --permissive
authselect --enableshadow --passalgo=sha512

# Root password (default: admin)
rootpw --iscrypted $6$admin...$X8qPAWz6eUTLhC9b5VYd8XYLu8/iXJzxz7bZ1d4bB5h7oYe6LKCJfHJ.8iX2.iY7gD6l/XlV9U9Ol5bH/vV3/1

# Create admin user (default password: admin)
user --name=admin --groups=wheel --iscrypted --password=$6$admin...$X8qPAWz6eUTLhC9b5VYd8XYLu8/iXJzxz7bZ1d4bB5h7oYe6LKCJfHJ.8iX2.iY7gD6l/XlV9U9Ol5bH/vV3/1

# Disk partitioning - Azure/Hyper-V optimized
# No swap partition (per Azure best practices)
# Simple layout for maximum compatibility and expandability
zerombr
clearpart --all --initlabel
part /boot/efi --fstype=efi --size=200 --asprimary
part /boot --fstype=xfs --size=1024 --asprimary
part / --fstype=xfs --size=1 --grow --asprimary

# Bootloader configuration
bootloader --location=mbr --append="console=tty0 console=ttyS0,115200n8 earlyprintk=ttyS0,115200 rootdelay=300"

# Package selection - minimal with cloud and Hyper-V support
%packages --ignoremissing
@core
@base
cloud-init
cloud-utils-growpart
hyperv-daemons
WALinuxAgent
kernel
grub2-efi-x64
efibootmgr
shim-x64
sudo
python3
python3-pip
wget
curl
openssh-server
NetworkManager
# Remove unnecessary packages
-plymouth
-plymouth-core-libs
-plymouth-scripts
-NetworkManager-team
-NetworkManager-tui
%end

# Services configuration
services --enabled=sshd,NetworkManager,cloud-init,cloud-final,cloud-config,cloud-init-local

# Post-installation configuration
%post --log=/var/log/anaconda-post.log

# Configure sudo for admin user without password
echo "admin ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers.d/admin

# Enable SSH root login temporarily for Packer
sed -i 's/#PermitRootLogin yes/PermitRootLogin yes/' /etc/ssh/sshd_config
sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config

# Configure cloud-init for NoCloud and Azure datasources
mkdir -p /etc/cloud/cloud.cfg.d

# Azure datasource configuration
cat > /etc/cloud/cloud.cfg.d/91-azure_datasource.cfg << 'EOF'
datasource_list: [ Azure, NoCloud ]
datasource:
  Azure:
    apply_network_config: False
EOF

# Hyper-V KVP logging configuration
cat > /etc/cloud/cloud.cfg.d/10-azure-kvp.cfg << 'EOF'
reporting:
  logging:
    type: log
  telemetry:
    type: hyperv
EOF

# Disable cloud-init network configuration to avoid conflicts
echo 'network: {config: disabled}' > /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg

# Configure WALinuxAgent for cloud-init compatibility
if [ -f /etc/waagent.conf ]; then
    # Disable provisioning (let cloud-init handle it)
    sed -i 's/Provisioning.Enabled=y/Provisioning.Enabled=n/g' /etc/waagent.conf
    sed -i 's/Provisioning.UseCloudInit=n/Provisioning.UseCloudInit=y/g' /etc/waagent.conf
    # Disable resource disk formatting (let cloud-init handle it)
    sed -i 's/ResourceDisk.Format=y/ResourceDisk.Format=n/g' /etc/waagent.conf
    sed -i 's/ResourceDisk.EnableSwap=y/ResourceDisk.EnableSwap=n/g' /etc/waagent.conf
fi

# Enable services
systemctl enable cloud-init cloud-config cloud-final cloud-init-local
systemctl enable walinuxagent
systemctl enable NetworkManager
systemctl enable sshd

# Configure Hyper-V integration services
if [ -f /etc/systemd/system.conf ]; then
    echo "DefaultTimeoutStartSec=300s" >> /etc/systemd/system.conf
    echo "DefaultTimeoutStopSec=300s" >> /etc/systemd/system.conf
fi

# Ensure proper permissions
chmod 600 /etc/sudoers.d/admin

%end

# Reboot after installation
reboot